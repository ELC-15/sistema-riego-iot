<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Riego Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-green-400">Sistema de Riego - Monitoreo Múltiple</h1>
            <p class="text-gray-400">Datos recibidos vía MQTT & WebSockets</p>
        </header>

        <!-- Tarjetas de Monitoreo -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
                <h3 class="text-gray-400 uppercase text-xs font-semibold">ID del Nodo activo</h3>
                <p id="nodo-id" class="text-2xl font-mono text-yellow-400 mt-2">Esperando...</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
                <h3 class="text-gray-400 uppercase text-xs font-semibold">Temperatura ambiente</h3>
                <p class="text-4xl font-bold text-orange-400 mt-2"><span id="temp">--</span>°C</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
                <h3 class="text-gray-400 uppercase text-xs font-semibold">Humedad del Suelo</h3>
                <p class="text-4xl font-bold text-blue-400 mt-2"><span id="humedad">--</span>%</p>
            </div>
        </div>
    </div>

    <script>
        // Conectar al WebSocket del servidor de Node.js
        const socket = io();

        // Escuchar los datos procesados que manda el servidor
        socket.on('datos-sensor', (data) => {
            // Actualizar la interfaz en tiempo real
            document.getElementById('nodo-id').innerText = data.nodo_id;
            document.getElementById('temp').innerText = data.temperatura;
            document.getElementById('humedad').innerText = data.humedad_suelo;
        });
    </script>
</body>
</html>
